# .coderabbit.yaml — oee (Open Execution Engine, documentation/specification repo)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "core/**/*.md"
      instructions: |
        OEE is the domain-agnostic enforcement substrate for Sigil.
        - Verify warranty templates follow the established schema.
        - Check that policy evaluation logic descriptions are deterministic, not probabilistic.
        - Flag any language that implies optional enforcement — OEE enforcement is mandatory.

    - path: "verticals/**"
      instructions: |
        Vertical-specific extensions of OEE.
        - Verify each vertical references core OEE primitives correctly.
        - Check that vertical-specific rules do not conflict with core enforcement.

    - path: "architecture.md"
      instructions: |
        Public-facing architecture document.
        - Verify descriptions match the current implementation in sigil-sign and sigil-vault.
        - Flag any claims about features not yet shipped.
        - Check that cryptographic descriptions are precise (Ed25519, JWT, attestation lifecycle).

    - path: "**/*.md"
      instructions: |
        Check for internal consistency across documents. Flag contradictions between files.

  path_filters:
    - "!.claude/**"
